version: "3.8"

services:
  db:
    image: postgres:16
    container_name: topology-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: topologydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata: